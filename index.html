<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="中文 Cards">
<title>中文 Flashcards</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f2f2f7;color:#1c1c1e}
.app{max-width:430px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh;background:#fff}
.topbar{display:flex;align-items:center;gap:10px;padding:12px 16px 8px;border-bottom:1px solid #e5e5ea;background:#fff;position:sticky;top:0;z-index:10}
#catname{font-size:12px;font-weight:600;color:#1c1c1e;flex:none;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pbw{flex:1;height:4px;background:#e5e5ea;border-radius:2px;overflow:hidden}
#pbf{height:100%;background:#007aff;border-radius:2px;transition:width .3s;width:0%}
#ptx{font-size:11px;color:#8e8e93;white-space:nowrap;min-width:36px;text-align:right}
.tabs{overflow-x:auto;white-space:nowrap;padding:8px 16px;background:#fff;border-bottom:1px solid #e5e5ea;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{display:inline-block;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #e5e5ea;background:#f2f2f7;color:#8e8e93;margin-right:5px;user-select:none;-webkit-user-select:none}
.tab.on{background:#2d3561;color:#fff;border-color:#2d3561}
.legend{display:flex;gap:8px;justify-content:center;padding:7px 16px 5px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:3px;font-size:10px;color:#8e8e93}
.tb{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;font-size:9px;font-weight:600}
.t1{background:#dbeafe;color:#1e40af}
.t2{background:#dcfce7;color:#166534}
.t3{background:#fef9c3;color:#854d0e}
.t4{background:#fee2e2;color:#991b1b}
.t0{background:#f2f2f7;color:#8e8e93}
.area{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px;gap:14px}
.card{width:100%;max-width:370px;background:#fff;border:1px solid #e5e5ea;border-radius:22px;padding:28px 20px 20px;display:flex;flex-direction:column;align-items:center;min-height:320px;position:relative;box-shadow:0 2px 10px rgba(0,0,0,.05)}
#cnum{position:absolute;top:13px;left:16px;font-size:10px;color:#aeaeb2}
#emoji{font-size:72px;line-height:1;margin-bottom:14px;user-select:none;-webkit-user-select:none}
#cen{font-size:22px;font-weight:600;color:#1c1c1e;text-align:center;margin-bottom:18px;line-height:1.3}
#revbtn{padding:11px 28px;border-radius:22px;font-size:14px;font-weight:500;border:1px solid #e5e5ea;background:#f2f2f7;color:#1c1c1e;cursor:pointer;-webkit-appearance:none}
#pyblock{display:none;flex-direction:column;align-items:center;gap:7px;width:100%;margin-top:6px}
#cpy{font-size:20px;font-weight:600;color:#007aff;text-align:center;letter-spacing:.03em;text-transform:lowercase}
#ctones{font-size:10px;text-align:center;display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;min-height:20px}
#czh{font-size:38px;color:#1c1c1e;text-align:center}
#ctip{font-size:11px;color:#8e8e93;text-align:center;line-height:1.6;padding:0 8px;font-style:italic}
.nav{display:flex;gap:10px;width:100%;max-width:370px}
.kbtn{flex:1;padding:15px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;border:1px solid #e5e5ea;background:#f2f2f7;color:#1c1c1e;-webkit-appearance:none}
.kyes{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
.kno{background:#fff1f2;color:#b91c1c;border-color:#fecdd3}
#score{font-size:11px;color:#8e8e93;text-align:center;min-height:16px}
#score b{color:#1c1c1e;font-weight:600}
#donescreen{display:none;width:100%;max-width:370px;background:#fff;border:1px solid #e5e5ea;border-radius:22px;padding:40px 24px;flex-direction:column;align-items:center;gap:14px;text-align:center;min-height:320px;justify-content:center}
#donescreen h2{font-size:20px;font-weight:700}
#donescreen p{font-size:13px;color:#8e8e93}
#donebtn{margin-top:8px;padding:11px 28px;border-radius:22px;font-size:14px;font-weight:500;border:1px solid #e5e5ea;background:#f2f2f7;color:#1c1c1e;cursor:pointer;-webkit-appearance:none}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div id="catname"></div>
    <div class="pbw"><div id="pbf"></div></div>
    <div id="ptx">0/0</div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="legend">
    <div class="li"><span class="tb t1">1</span>flat</div>
    <div class="li"><span class="tb t2">2</span>rising</div>
    <div class="li"><span class="tb t3">3</span>dip</div>
    <div class="li"><span class="tb t4">4</span>falling</div>
    <div class="li"><span class="tb t0">·</span>neutral</div>
  </div>

  <div class="area">

    <div class="card" id="cardbox">
      <span id="cnum"></span>
      <div id="emoji"></div>
      <div id="cen"></div>
      <button id="revbtn" onclick="reveal()">show pronunciation</button>
      <div id="pyblock">
        <div id="cpy"></div>
        <div id="ctones"></div>
        <div id="czh"></div>
        <div id="ctip"></div>
      </div>
    </div>

    <div id="donescreen">
      <div style="font-size:64px">🎉</div>
      <h2>set complete!</h2>
      <p id="donemsg"></p>
      <button id="donebtn" onclick="replay()">try again</button>
    </div>

    <div class="nav">
      <button class="kbtn kno" onclick="mark(false)">✕ not yet</button>
      <button class="kbtn kyes" onclick="mark(true)">✓ got it</button>
    </div>

    <div id="score"></div>

  </div>
</div>
<script>

var cats=Object.keys(V);
var cat=0, deck=[], idx=0, seen=0, got=0;
var tc={1:'t1',2:'t2',3:'t3',4:'t4',0:'t0'};

function buildTabs(){
  var el=document.getElementById('tabs');
  var h='';
  for(var i=0;i<cats.length;i++){
    h+='<button class="tab'+(i===cat?' on':'')+'" onclick="switchCat('+i+')">'+cats[i]+'</button>';
  }
  el.innerHTML=h;
  document.getElementById('catname').textContent=cats[cat];
}

function switchCat(i){
  cat=i; idx=0; seen=0; got=0;
  deck=V[cats[cat]].slice();
  buildTabs();
  showCard();
}

function showCard(){
  document.getElementById('donescreen').style.display='none';
  document.getElementById('cardbox').style.display='flex';
  document.querySelector('.nav').style.display='flex';
  document.getElementById('score').textContent='';

  if(idx>=deck.length){ showDone(); return; }
  var c=deck[idx];

  document.getElementById('cnum').textContent=(idx+1)+' / '+deck.length;
  document.getElementById('emoji').textContent=c.em;
  document.getElementById('cen').textContent=c.e;
  document.getElementById('cpy').textContent=c.p;
  document.getElementById('czh').textContent=c.z;
  document.getElementById('ctip').textContent=c.tip||'';
  document.getElementById('pyblock').style.display='none';
  document.getElementById('revbtn').style.display='block';

  var tb=document.getElementById('ctones');
  while(tb.firstChild) tb.removeChild(tb.firstChild);
  for(var i=0;i<c.t.length;i++){
    var n=c.t[i];
    var sp=document.createElement('span');
    sp.className='tb '+tc[n];
    sp.textContent=(n===0)?'·':String(n);
    tb.appendChild(sp);
  }

  document.getElementById('pbf').style.width=Math.round(idx/deck.length*100)+'%';
  document.getElementById('ptx').textContent=idx+'/'+deck.length;
}

function reveal(){
  document.getElementById('pyblock').style.display='flex';
  document.getElementById('revbtn').style.display='none';
}

function mark(yes){
  seen++;
  if(yes) got++;
  idx++;
  showCard();
  if(seen>0){
    var s=document.getElementById('score');
    s.textContent=got+' got it · '+(seen-got)+' still learning';
  }
}

function showDone(){
  document.getElementById('cardbox').style.display='none';
  document.getElementById('donescreen').style.display='flex';
  document.querySelector('.nav').style.display='none';
  document.getElementById('donemsg').textContent=got+' / '+deck.length+' — nice work';
  document.getElementById('pbf').style.width='100%';
  document.getElementById('ptx').textContent=deck.length+'/'+deck.length;
}

function replay(){
  idx=0; seen=0; got=0;
  deck=V[cats[cat]].slice();
  showCard();
}

switchCat(0);
