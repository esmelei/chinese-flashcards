<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="中文 Cards">
<title>中文 Flashcards</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:#F4F4EF;color:#1c1c1e}
.app{max-width:430px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh;background:#F4F4EF}

/* TOP BAR */
.topbar{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;background:#fff;border-bottom:1px solid #ddddd8;position:sticky;top:0;z-index:10}
#catname{font-size:12px;font-weight:700;color:#1c1c1e;flex:none;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pbw{flex:1;height:4px;background:#ddddd8;border-radius:2px;overflow:hidden}
#pbf{height:100%;background:#4A7BC8;border-radius:2px;transition:width .3s;width:0%}
#ptx{font-size:11px;color:#8e8e93;white-space:nowrap;min-width:36px;text-align:right}

/* TABS */
.tabs{overflow-x:auto;white-space:nowrap;padding:10px 16px;background:#fff;border-bottom:1px solid #ddddd8;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{display:inline-block;padding:7px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #e0e0e5;background:#F4F4EF;color:#8e8e93;margin-right:6px;user-select:none;-webkit-user-select:none}
.tab.on{background:#1c2a5e;color:#fff;border-color:#1c2a5e}

/* AREA */
.area{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px;gap:14px}

/* CARD */
.card{width:100%;max-width:390px;background:#F4F4EF;border-radius:24px;padding:28px 24px 24px;display:flex;flex-direction:column;align-items:center;min-height:360px;position:relative;box-shadow:0 2px 16px rgba(0,0,0,.07)}
#cnum{position:absolute;top:14px;left:18px;font-size:10px;color:#c0c0c8;font-weight:500}
#emoji{font-size:72px;line-height:1;margin-bottom:16px;user-select:none;-webkit-user-select:none}
#cen{font-size:24px;font-weight:700;color:#1c1c1e;text-align:center;margin-bottom:20px;line-height:1.3}

/* REVEAL BUTTON */
#revbtn{padding:13px 36px;border-radius:30px;font-size:15px;font-weight:600;border:none;background:#4A7BC8;color:#fff;cursor:pointer;-webkit-appearance:none;letter-spacing:.01em}

/* PRONUNCIATION BLOCK */
#pyblock{display:none;flex-direction:column;align-items:center;gap:12px;width:100%;margin-top:4px}

/* CHINESE CHARACTERS */
#czh{font-size:28px;color:#4A7BC8;text-align:center;font-weight:400;letter-spacing:.05em}

/* WORD ROW */
#wordrow{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;width:100%;padding:4px 0}
.word{display:flex;flex-direction:column;align-items:center;gap:0}
.word-ph{font-size:11px;color:#a0a0aa;font-weight:400;text-align:center;margin-bottom:3px;font-style:normal}
.word-py{font-size:22px;font-weight:700;color:#4A7BC8;text-align:center;border-bottom:2px solid #4A7BC8;padding-bottom:2px;margin-bottom:4px;text-transform:lowercase}
.word-en{font-size:11px;color:#8e8e93;text-align:center;font-style:italic}

/* FOOTNOTE */
#fnote{font-size:12px;color:#8e8e93;text-align:left;line-height:1.6;font-style:italic;width:100%;padding:10px 4px 0;border-top:1px solid #ddddd8;margin-top:4px}

/* DONE SCREEN */
#donescreen{display:none;width:100%;max-width:390px;background:#F4F4EF;border-radius:24px;padding:48px 24px;flex-direction:column;align-items:center;gap:16px;text-align:center;min-height:360px;justify-content:center;box-shadow:0 2px 16px rgba(0,0,0,.07)}
#donescreen h2{font-size:22px;font-weight:700}
#donescreen p{font-size:14px;color:#8e8e93}
#donebtn{margin-top:8px;padding:13px 36px;border-radius:30px;font-size:15px;font-weight:600;border:none;background:#4A7BC8;color:#fff;cursor:pointer;-webkit-appearance:none}

/* NAV BUTTONS */
.nav{display:flex;gap:12px;width:100%;max-width:390px}
.kbtn{flex:1;padding:16px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;border:none;-webkit-appearance:none;letter-spacing:.01em}
.kno{background:#E8502A;color:#fff}
.kyes{background:#6A9E7A;color:#fff}

#score{font-size:11px;color:#8e8e93;text-align:center;min-height:16px}
#score b{color:#1c1c1e;font-weight:600}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div id="catname"></div>
    <div class="pbw"><div id="pbf"></div></div>
    <div id="ptx">0/0</div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="area">
    <div class="card" id="cardbox">
      <span id="cnum"></span>
      <div id="emoji"></div>
      <div id="cen"></div>
      <button id="revbtn" onclick="reveal()">show pronunciation</button>
      <div id="pyblock">
        <div id="czh"></div>
        <div id="wordrow"></div>
        <div id="fnote"></div>
      </div>
    </div>
    <div id="donescreen">
      <div style="font-size:64px">&#127881;</div>
      <h2>set complete!</h2>
      <p id="donemsg"></p>
      <button id="donebtn" onclick="replay()">try again</button>
    </div>
    <div class="nav" id="navrow">
      <button class="kbtn kno" onclick="mark(false)">&#x2715; not yet</button>
      <button class="kbtn kyes" onclick="mark(true)">&#x2713; got it</button>
    </div>
    <div id="score"></div>
  </div>
</div>

var cats=Object.keys(V);
var cat=0,deck=[],idx=0,seen=0,got=0;

function buildTabs(){
  var h='';
  for(var i=0;i<cats.length;i++){
    h+='<button class="tab'+(i===cat?' on':'')+'" onclick="switchCat('+i+')">'+cats[i]+'</button>';
  }
  document.getElementById('tabs').innerHTML=h;
  document.getElementById('catname').textContent=cats[cat];
}

function switchCat(i){
  cat=i;idx=0;seen=0;got=0;
  deck=V[cats[cat]].slice();
  buildTabs();
  showCard();
}

function showCard(){
  document.getElementById('donescreen').style.display='none';
  document.getElementById('cardbox').style.display='flex';
  document.getElementById('navrow').style.display='flex';
  document.getElementById('score').textContent='';
  if(idx>=deck.length){showDone();return;}
  var c=deck[idx];
  document.getElementById('cnum').textContent=(idx+1)+' / '+deck.length;
  document.getElementById('emoji').textContent=c.em;
  document.getElementById('cen').textContent=c.e;
  document.getElementById('czh').textContent=c.z;
  document.getElementById('pyblock').style.display='none';
  document.getElementById('revbtn').style.display='block';

  // build word row
  var wr=document.getElementById('wordrow');
  while(wr.firstChild)wr.removeChild(wr.firstChild);
  for(var i=0;i<c.words.length;i++){
    var w=c.words[i];
    var div=document.createElement('div');
    div.className='word';
    var ph=document.createElement('div');ph.className='word-ph';ph.textContent=w.ph;
    var py=document.createElement('div');py.className='word-py';py.textContent=w.py;
    var en=document.createElement('div');en.className='word-en';en.textContent=w.en;
    div.appendChild(ph);div.appendChild(py);div.appendChild(en);
    wr.appendChild(div);
  }

  // footnote
  var fn=document.getElementById('fnote');
  if(c.note){fn.textContent=c.note;fn.style.display='block';}
  else{fn.textContent='';fn.style.display='none';}

  bar();
}

function reveal(){
  document.getElementById('pyblock').style.display='flex';
  document.getElementById('revbtn').style.display='none';
}

function mark(yes,silent){
  seen++;if(yes)got++;
  idx++;showCard();
  if(!silent&&seen>0){
    var s=document.getElementById('score');
    s.innerHTML='<b>'+got+'</b> got it &middot; <b>'+(seen-got)+'</b> still learning';
  }
}

function bar(){
  var n=deck.length;
  document.getElementById('pbf').style.width=(n?Math.round(idx/n*100):0)+'%';
  document.getElementById('ptx').textContent=idx+'/'+n;
}

function showDone(){
  document.getElementById('cardbox').style.display='none';
  document.getElementById('donescreen').style.display='flex';
  document.getElementById('navrow').style.display='none';
  document.getElementById('donemsg').textContent=got+' / '+deck.length+' — nice work';
  document.getElementById('pbf').style.width='100%';
  document.getElementById('ptx').textContent=deck.length+'/'+deck.length;
}

function replay(){
  idx=0;seen=0;got=0;
  deck=V[cats[cat]].slice();
  showCard();
}

switchCat(0);

// Swipe support — left=next, right=previous
var txStart=0,tyStart=0,txEnd=0,tyEnd=0;
function onTS(e){txStart=e.changedTouches[0].screenX;tyStart=e.changedTouches[0].screenY;}
function onTE(e){txEnd=e.changedTouches[0].screenX;tyEnd=e.changedTouches[0].screenY;doSwipe();}
function doSwipe(){
  var dx=txEnd-txStart,dy=tyEnd-tyStart;
  if(Math.abs(dx)<50||Math.abs(dy)>Math.abs(dx))return;
  var cb=document.getElementById('cardbox');
  if(!cb||cb.style.display==='none')return;
  if(dx<0){
    // swipe left = next card
    animCard('left');
    setTimeout(function(){mark(false,true);},180);
  } else {
    // swipe right = previous card
    if(idx===0)return;
    animCard('right');
    setTimeout(function(){prevCard();},180);
  }
}
function animCard(dir){
  var cb=document.getElementById('cardbox');
  if(!cb)return;
  cb.style.transition='transform .18s ease,opacity .18s ease';
  cb.style.transform=dir==='left'?'translateX(-60px)':'translateX(60px)';
  cb.style.opacity='0';
  setTimeout(function(){
    cb.style.transition='none';
    cb.style.transform='translateX(0)';
    cb.style.opacity='1';
  },200);
}
function prevCard(){
  if(idx>0){
    idx--;
    if(seen>0)seen--;
    showCard();
    var s=document.getElementById('score');
    if(seen>0){s.innerHTML='<b>'+got+'</b> got it &middot; <b>'+(seen-got)+'</b> still learning';}
    else{s.textContent='';}
  }
}
var cb2=document.getElementById('cardbox');
cb2.addEventListener('touchstart',onTS,{passive:true});
cb2.addEventListener('touchend',onTE,{passive:true});

</script>
